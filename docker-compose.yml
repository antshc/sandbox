services:
  sandbox:
    build: .
    cap_add:
      - NET_ADMIN
      - SETUID
      - SETGID
    cap_drop:
      - ALL
    environment:
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}
    volumes:
      - ./config:/etc/mitmproxy/config:ro
      - ./logs:/var/log/mitmproxy
      - ./hello:/home/ubuntu/workspace
